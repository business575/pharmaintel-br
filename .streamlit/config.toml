[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 10
maxMessageSize = 50

[runner]
fastReruns = true

[client]
showErrorDetails = false

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#00897B"
backgroundColor = "#0A1628"
secondaryBackgroundColor = "#112240"
textColor = "#E2EAF4"
font = "sans serif"
